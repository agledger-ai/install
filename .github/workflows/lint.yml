name: Lint & workflow security

# install carries privileged shell that runs on customer machines (curl|sh
# installer, backup/restore/vault scripts) — lint it, and statically analyze
# our workflows with zizmor. Findings surface in the Security tab as SARIF.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: ShellCheck (preinstalled on ubuntu runners)
        run: shellcheck --severity=warning scripts/*.sh tests/*.sh

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
