name: Lint & workflow security

# install carries privileged shell that runs on customer machines (curl|sh
# installer, backup/restore/vault scripts) — lint it, and statically analyze
# our workflows with zizmor. Findings surface in the Security tab as SARIF.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: ShellCheck (preinstalled on ubuntu runners)
        run: shellcheck --severity=warning scripts/*.sh tests/*.sh

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
