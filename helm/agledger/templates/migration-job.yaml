apiVersion: batch/v1
kind: Job
metadata:
  # Bundled Postgres is a normal chart resource, not a hook — Helm only creates it
  # AFTER all pre-install hooks succeed. If the migration ran as a pre-install hook
  # here, its wait-for-db init container would block forever waiting for a Postgres
  # that does not yet exist → `helm install` deadlocks (F-678 / api#590). So on the
  # bundled path the migration is a normal resource too, applied alongside Postgres,
  # ordered by the wait-for-db init container below. The name is per-revision so
  # `helm upgrade` creates a fresh Job (a fixed-name normal Job is rejected on
  # upgrade — Job pod templates are immutable); ttlSecondsAfterFinished GCs old ones.
  # External DB always pre-exists, so that path keeps the pre-install/pre-upgrade hook.
  name: {{ include "agledger.fullname" . }}-migrate{{- if .Values.postgres.bundled.enabled }}-{{ .Release.Revision }}{{- end }}
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  {{- if not .Values.postgres.bundled.enabled }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "agledger.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      serviceAccountName: {{ include "agledger.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      {{- if .Values.postgres.bundled.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgres.bundled.image }}
          command: ['sh', '-c', 'until pg_isready -h {{ include "agledger.fullname" . }}-postgres -p 5432 -U agledger; do echo "Waiting for postgres..."; sleep 2; done']
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "agledger.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/nodejs/bin/node", "dist/src/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "agledger.fullname" . }}
            - secretRef:
                name: {{ include "agledger.secretName" . }}
          {{- if .Values.secrets.databaseUrlMigrate }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agledger.secretName" . }}
                  key: DATABASE_URL_MIGRATE
          {{- end }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          resources:
            {{- toYaml (.Values.migrate.resources | default .Values.api.resources) | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "agledger.licenseVolumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "agledger.licenseVolume" . | nindent 8 }}
