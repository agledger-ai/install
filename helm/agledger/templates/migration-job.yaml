apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agledger.fullname" . }}-migrate
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "agledger.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      serviceAccountName: {{ include "agledger.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      {{- if .Values.postgres.bundled.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgres.bundled.image }}
          command: ['sh', '-c', 'until pg_isready -h {{ include "agledger.fullname" . }}-postgres -p 5432 -U agledger; do echo "Waiting for postgres..."; sleep 2; done']
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "agledger.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/nodejs/bin/node", "dist/src/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "agledger.fullname" . }}
            - secretRef:
                name: {{ include "agledger.secretName" . }}
          {{- if .Values.secrets.databaseUrlMigrate }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agledger.secretName" . }}
                  key: DATABASE_URL_MIGRATE
          {{- end }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "agledger.licenseVolumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "agledger.licenseVolume" . | nindent 8 }}
