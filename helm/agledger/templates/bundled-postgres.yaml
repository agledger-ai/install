{{- if .Values.postgres.bundled.enabled }}
# Bundled PostgreSQL for development, evaluation, and small deployments.
# For production with external databases, set postgres.bundled.enabled=false
# and configure database.externalUrl.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agledger.fullname" . }}-postgres
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "agledger.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agledger.fullname" . }}-pgdata
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.bundled.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agledger.fullname" . }}-postgres
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agledger.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "agledger.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.bundled.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: agledger
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agledger.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: agledger
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'agledger']
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'agledger']
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.bundled.resources | nindent 12 }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: {{ include "agledger.fullname" . }}-pgdata
{{- end }}
