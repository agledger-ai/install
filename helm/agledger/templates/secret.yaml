{{- if not .Values.secrets.existingSecret }}
{{- if and (not .Values.database.externalUrl) (not .Values.postgres.bundled.enabled) }}
  {{- fail "database.externalUrl is required when postgres.bundled.enabled is false — provide a PostgreSQL connection string" }}
{{- end }}
{{/* Auto-generate apiKeySecret if not provided (64-char hex, same as install.sh) */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "agledger.fullname" .) | default dict }}
{{- $existingData := $existingSecret.data | default dict }}
{{- $apiKeySecret := .Values.secrets.apiKeySecret | default ($existingData.API_KEY_SECRET | default "" | b64dec) | default (randAlphaNum 64) }}
{{/* Vault signing key: reuse existing → user-provided → fail with helpful message */}}
{{- $vaultSigningKey := .Values.secrets.vaultSigningKey | default ($existingData.VAULT_SIGNING_KEY | default "" | b64dec) }}
{{- if not $vaultSigningKey }}
  {{- fail "secrets.vaultSigningKey is required on first install. Run the quick-start script:\n  curl -fsSL https://agledger.ai/helm-install.sh | bash\nOr generate manually:\n  kubectl run keygen --rm -it --restart=Never --image=agledger/agledger -- /nodejs/bin/node dist/scripts/generate-signing-key.js" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agledger.fullname" . }}
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  API_KEY_SECRET: {{ $apiKeySecret | quote }}
  VAULT_SIGNING_KEY: {{ $vaultSigningKey | quote }}
  {{- if .Values.secrets.webhookEncryptionKey }}
  WEBHOOK_ENCRYPTION_KEY: {{ .Values.secrets.webhookEncryptionKey | quote }}
  {{- end }}
  {{- if .Values.database.externalUrl }}
  DATABASE_URL: {{ .Values.database.externalUrl | quote }}
  {{- else if .Values.postgres.bundled.enabled }}
  POSTGRES_PASSWORD: {{ default "agledger" .Values.postgres.bundled.password | quote }}
  # checkov:skip=CKV_SECRET_4: helm template placeholder, not a literal credential
  DATABASE_URL: {{ printf "postgresql://agledger:%s@%s-postgres:5432/agledger" (default "agledger" .Values.postgres.bundled.password) (include "agledger.fullname" .) | quote }}
  {{- end }}
  {{- if .Values.secrets.databaseUrlMigrate }}
  DATABASE_URL_MIGRATE: {{ .Values.secrets.databaseUrlMigrate | quote }}
  {{- end }}
  {{- if .Values.secrets.licenseKey }}
  AGLEDGER_LICENSE_KEY: {{ .Values.secrets.licenseKey | quote }}
  {{- end }}
  {{- if .Values.secrets.proxyDatabaseUrl }}
  PROXY_DATABASE_URL: {{ .Values.secrets.proxyDatabaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeySecretPrevious }}
  API_KEY_SECRET_PREVIOUS: {{ .Values.secrets.apiKeySecretPrevious | quote }}
  {{- end }}
  {{- if .Values.federation.registrationToken }}
  AGLEDGER_REGISTRATION_TOKEN: {{ .Values.federation.registrationToken | quote }}
  {{- end }}
{{- end }}
