apiVersion: v1
kind: Pod
metadata:
  name: {{ include "agledger.fullname" . }}-test-connection
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.18.0
      command:
        - sh
        - -c
        - |
          curl --fail --silent --show-error --max-time 10 http://{{ include "agledger.fullname" . }}/health &&
          curl --fail --silent --show-error --max-time 10 http://{{ include "agledger.fullname" . }}/health/ready
