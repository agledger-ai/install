apiVersion: v1
kind: Service
metadata:
  name: {{ include "agledger.fullname" . }}
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "agledger.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# Worker service — exposes health + metrics for Prometheus scraping
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agledger.fullname" . }}-worker
  labels:
    {{- include "agledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.worker.healthPort }}
      targetPort: {{ .Values.worker.healthPort }}
      protocol: TCP
      name: health
  selector:
    {{- include "agledger.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
