## AGLedger Helm Chart — Default Values

image:
  repository: agledger/agledger
  tag: ""  # defaults to appVersion
  # Pin by content hash for production. When `digest` is set the rendered image
  # reference is `repository@sha256:...` and `tag` is purely cosmetic. Digest
  # pinning bypasses kubelet's tag-name cache: with `pullPolicy: IfNotPresent`
  # (the default below), a node that previously pulled ANY image under the
  # same tag will NOT re-pull on the next deploy — your pod can boot against
  # a stale layer while ECR/Docker Hub serve a newer one under the same tag.
  # Pinning by digest makes the cache key the bytes you actually want, so
  # silent rollbacks are impossible.
  #
  #   image:
  #     repository: agledger/agledger
  #     tag: "X.Y.Z"  # cosmetic; ignored when digest is set
  #     digest: "sha256:<the digest you cosign-verified>"
  #
  # Look up + verify the current digest via:
  #   cosign verify --certificate-oidc-issuer https://token.actions.githubusercontent.com \
  #     --certificate-identity-regexp '^https://github.com/agledger-ai/agledger-api/.+@refs/tags/v.+$' \
  #     agledger/agledger:<tag>
  #   docker buildx imagetools inspect agledger/agledger:<tag>   # to read the digest
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []  # For private registries (ECR, GCR): add imagePullSecrets here

# ---
# API Service
# ---
# Sizing guidance:
#   Single-node clusters (e.g. one t3.medium = 2 vCPU): keep `strategy.type: Recreate`
#     and the resource defaults below — combined api+worker requests fit in 2 vCPU.
#   Multi-node / HA: switch `strategy` to `RollingUpdate`, set `replicaCount: 2+`,
#     enable autoscaling, and bump resources. RollingUpdate creates new pods before
#     terminating old ones, so the cluster needs ~2x per-pod CPU/memory headroom
#     during a rollout. On a single 2 vCPU node this fails to schedule and
#     `helm upgrade` hangs (issue #241 / testbed F-366).
# Node 24 Permission Model runtime hardening (--permission, stable in Node 24).
# Applied to both the API and worker. Denies filesystem WRITES, child processes,
# worker threads, native addons, WASI, and the inspector — the primitives a
# compromised npm dependency reaches for. Network is NOT gated by Node's
# permission model, so listeners + outbound webhook/JWKS/federation calls are
# unaffected. Both the API and worker boot verified-clean under this profile.
permission:
  enabled: true
  # Extra node --allow-* args appended to both API and worker argv. Use to widen
  # the sandbox for opt-in features that need a denied capability, e.g.:
  #   - "--allow-fs-write=/var/log/agledger"   # file SIEM sink (SIEM_FILE_ENABLED)
  extraAllowArgs: []

api:
  replicaCount: 1
  # Recreate is the safe default for single-node clusters. Switch to RollingUpdate
  # once you have multiple nodes (or a node large enough to host both old and new
  # pods simultaneously).
  strategy:
    type: Recreate
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: "1"
  nodeSelector: {}
  tolerations: []
  affinity: {}
    # Recommended for HA: spread API pods across nodes
    # podAntiAffinity:
    #   preferredDuringSchedulingIgnoredDuringExecution:
    #     - weight: 100
    #       podAffinityTerm:
    #         labelSelector:
    #           matchExpressions:
    #             - key: app.kubernetes.io/component
    #               operator: In
    #               values: [api]
    #         topologyKey: kubernetes.io/hostname
  topologySpreadConstraints: []
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ---
# Worker Service
# ---
# See `api` above for sizing guidance — same single-node vs. HA tradeoff applies.
worker:
  replicaCount: 1
  strategy:
    type: Recreate
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: "1"
  healthPort: 3001
  nodeSelector: {}
  tolerations: []
  affinity: {}
    # Recommended for HA: spread worker pods across nodes
    # podAntiAffinity:
    #   preferredDuringSchedulingIgnoredDuringExecution:
    #     - weight: 100
    #       podAffinityTerm:
    #         labelSelector:
    #           matchExpressions:
    #             - key: app.kubernetes.io/component
    #               operator: In
    #               values: [worker]
    #         topologyKey: kubernetes.io/hostname
  topologySpreadConstraints: []
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  pdb:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# ---
# Pre-install/pre-upgrade migration Job
# ---
migrate:
  # Defaults to api.resources. Override here if migrations need different limits.
  resources: {}

# ---
# Database (PostgreSQL)
# ---
database:
  externalUrl: ""  # required if postgres.bundled.enabled is false.
                   # IMPORTANT: the role that runs MIGRATIONS (this URL, or
                   # secrets.databaseUrlMigrate if set) must be a SUPERUSER —
                   # rds_superuser on Amazon RDS/Aurora, a true superuser on
                   # self-managed PostgreSQL. The schema installs an event
                   # trigger (agledger_block_audit_drop, which blocks dropping
                   # the audit chain), and event triggers require superuser;
                   # object-ownership / CREATE privileges alone are NOT enough
                   # and the migration fails with "permission denied to create
                   # event trigger" (F-679 / api#591). The API/Worker role
                   # (this URL when databaseUrlMigrate is set) only needs DML.
  poolMax: 20
  # Auto-rollback any idle-in-transaction backend that exceeds this many ms.
  # Closes the F-507 deadlock class where a stalled handler holds an advisory
  # lock indefinitely. 30s tolerates legitimate slow handlers while keeping
  # deadlock recovery within livez/readyz windows. Set to 0 to disable.
  idleInTxTimeoutMs: 30000

postgres:
  bundled:
    enabled: false
    image: postgres:18-alpine
    password: ""  # Empty = auto-generated 32-char random, preserved across upgrades (like apiKeySecret). Set to pin a specific password; also used in DATABASE_URL.
    storage: 10Gi
    # storageClassName for the bundled-PG data PVC. Leave empty ("") to use the
    # cluster's DEFAULT storageclass. Bundled PG REQUIRES either a default
    # storageclass or an explicit value here — otherwise the PVC stays Pending
    # forever and the install hangs (F-727). Modern EKS (1.30+) ships NO default
    # storageclass (the in-tree gp2 default is gone; the EBS CSI addon does not
    # mark one default) — on EKS set this to your provisioner's class, e.g. "gp3".
    storageClassName: ""
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 1Gi

# ---
# Extra environment (API + worker)
# ---
# Inject additional env vars into both workloads. The primary use is secrets
# CONSUMED BY PROVISIONING at boot — e.g. an HMAC webhook secret referenced from
# provisioning YAML as `secret: ${WEBHOOK_ACME_SECRET}` (substitution happens in
# the loader; provisioning runs on the API pod). The chart-managed Secret below
# only carries the engine's own keys, so bring webhook/integration secrets here,
# ideally by reference to an operator-managed (or External-Secrets-synced) Secret
# rather than inline plaintext.
extraEnv: []
  # - name: WEBHOOK_ACME_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: agledger-webhook-secrets
  #       key: acme
# Load every key of a Secret/ConfigMap as env — cleanest when you have several
# provisioning secrets at once.
extraEnvFrom: []
  # - secretRef:
  #     name: agledger-webhook-secrets

# ---
# Secrets
# ---
secrets:
  apiKeySecret: ""          # Auto-generated if empty (64-char random). Preserved across upgrades.
  vaultSigningKey: ""       # Ed25519 key for audit vault signatures. Generate with:
                             #   kubectl run keygen --rm -it --restart=Never --image=agledger/agledger \
                             #     -- /nodejs/bin/node dist/scripts/generate-signing-key.js
                             # Preserved across upgrades once set.
  webhookEncryptionKey: ""
  databaseUrlMigrate: ""    # optional — superuser DATABASE_URL for migrations (DDL).
                             # When set, the migration job uses this instead of the
                             # standard DATABASE_URL. Enables DB role separation:
                             # a SUPERUSER for DDL (migrations — see the event-trigger
                             # note on database.externalUrl: rds_superuser on RDS/Aurora,
                             # superuser on self-managed PG), agledger_app for DML
                             # (API/Worker). scripts/setup-db-roles.sh wires this split.
  licenseKey: ""            # optional — Inline PEM license string (AGLEDGER_LICENSE_KEY)
  apiKeySecretPrevious: ""  # optional — Previous API_KEY_SECRET for key rotation (zero-downtime)
  existingSecret: ""        # set to use a pre-existing Kubernetes Secret
                             # The Secret must contain these keys (as env var names):
                             #   DATABASE_URL          (required) — PostgreSQL connection string
                             #   API_KEY_SECRET        (required) — HMAC key for API key hashing
                             #   VAULT_SIGNING_KEY     (required) — Ed25519 key for audit vault signatures
                             #   WEBHOOK_ENCRYPTION_KEY (optional) — AES key for webhook payloads
                             #   DATABASE_URL_MIGRATE  (optional) — Owner-role URL for migrations
                             #   AGLEDGER_LICENSE_KEY  (optional) — PEM license string

# ---
# License (Enterprise)
# ---
# No license = Developer Edition (all features enabled — enforcement is contractual, not software).
# License problems fail-open — all features remain enabled with ERROR logs.
license:
  releaseDate: ""           # YYYY-MM-DD — baked into image at build time; override only if building from source
  keyFile:
    enabled: false          # Mount a PEM license file from a K8s Secret
    secretName: ""          # Name of the K8s Secret containing the license PEM
    secretKey: license.pem  # Key within the Secret
    mountPath: /run/secrets/agledger-license.pem  # Path inside the container

# ---
# AWS Marketplace — alternative license source via License Manager
# ---
marketplace:
  productCode: ""             # AWS Marketplace product code (enables Marketplace licensing)
  publicKeyVersion: ""        # Key version for CheckoutLicense (default: SDK default)
  # IAM role for License Manager access (IRSA on EKS)
  serviceAccountAnnotations: {}
  # Example:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/agledger-marketplace

# ---
# Application Config
# ---
config:
  logLevel: info
  trustProxy: false
  nodeEnv: production
  externalUrl: ""  # Public URL where this instance is reachable (e.g., https://agledger.example.com).
                    # The Server's published identity — the issuer (`iss`) signed into every
                    # record/receipt/cert; required in production. Cascades to the A2A agent
                    # card URL. Auto-derived from ingress.hosts[0] when set; otherwise falls
                    # back to https://localhost so the pod boots — override for a real issuer.
  otelProvider: "generic"
  # Primary contract type for agent discovery docs (/llms.txt, /llms-full.txt).
  # Pick your primary use case so agents see it first; empty string uses the
  # first alphabetical active contract as a deterministic fallback.
  exampleType: ""
  rateLimitEnabled: true
  corsEnabled: true
  helmetEnabled: true
  nodeExtraCaCerts: ""  # Path to CA bundle inside the container.
                         # For Aurora/RDS: /etc/ssl/certs/rds-global-bundle.pem (bundled in image)
                         # For Cloud SQL or private CAs: mount your cert and set the path here

# ---
# Ingress
# ---
ingress:
  enabled: false
  className: ""
  annotations: {}
  # AWS ALB example:
  #   kubernetes.io/ingress.class: alb
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/healthcheck-path: /health
  # nginx example:
  #   kubernetes.io/ingress.class: nginx
  hosts: []
  #  - host: api.agledger.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []
  #  - secretName: agledger-tls
  #    hosts:
  #      - api.agledger.example.com

# ---
# Horizontal Pod Autoscaler
# ---
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# ---
# Network Policy
# ---
networkPolicy:
  enabled: true
  ingressFrom:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
  # Source CIDRs allowed to reach the API on port 3000, in addition to the
  # ingressFrom podSelectors above. Required for load balancers that connect
  # from outside the pod network — e.g. AWS ALB with target-type: ip health-
  # checks and forwards traffic from VPC ENIs, which no podSelector can match.
  # Set this to your VPC or subnet CIDR(s) instead of disabling the policy.
  ingressCIDRs: []
  #  - 10.0.0.0/16

# ---
# Pod Disruption Budget
# ---
pdb:
  enabled: true
  minAvailable: 1

# ---
# Service Account
# ---
serviceAccount:
  create: true
  name: ""

# ---
# Provisioning (YAML config-as-code)
# ---
# Mounts YAML files at startup for declarative resource management.
# See: docs/engineering/DESIGN-PROVISIONING.md
provisioning:
  enabled: false
  configPath: /etc/agledger/provisioning  # Mount path inside container
  dryRun: false
  prune: false
  immutable: false  # Set true to create immutable ConfigMap (reduces apiserver load;
                     # requires delete + recreate on changes, not in-place edit)

  # Reference existing ConfigMaps (one per subdirectory).
  # Mutually exclusive with inline content below.
  # Each ConfigMap is mounted directly as the corresponding subdirectory.
  existingConfigMaps:
    orgs: ""  # ConfigMap name for orgs/*.yaml
    agents: ""       # ConfigMap name for agents/*.yaml
    webhooks: ""     # ConfigMap name for webhooks/*.yaml
    schemas: ""      # ConfigMap name for schemas/*.yaml

  # Inline YAML content — a ConfigMap is created automatically.
  # Each key becomes a file in the corresponding subdirectory.
  orgs: {}
  #  my-corp.yaml: |
  #    orgs:
  #      - name: My Corp
  #        slug: my-corp

  agents: {}
  #  my-agent.yaml: |
  #    agents:
  #      - slug: my-agent
  #        displayName: My Agent

  webhooks: {}
  #  notifications.yaml: |
  #    webhooks:
  #      - url: https://hooks.example.com/agledger

  schemas: {}
  #  custom-type.yaml: |
  #    schemas:
  #      - type_name: CUSTOM-TYPE-v1
  #        category: custom
