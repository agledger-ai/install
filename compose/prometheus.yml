global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: agledger-api
    static_configs:
      - targets: ['agledger-api:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
