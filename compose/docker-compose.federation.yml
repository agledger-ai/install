# =============================================================================
# AGLedger — Federation Docker Compose (Hub + Gateways)
# =============================================================================
# Runs a multi-instance federation topology for evaluation and testing.
# Each instance has its own PostgreSQL, migrations, API, and worker.
#
# Prerequisites:
#   npx tsx scripts/generate-federation-keys.ts    # generates federation keys
#
# Manual start (after init):
#   docker compose -f deploy/compose/docker-compose.federation.yml up -d --wait
#
# Teardown:
#   docker compose -f deploy/compose/docker-compose.federation.yml down -v
# =============================================================================

x-app-image: &app-image
  image: agledger/agledger:${AGLEDGER_VERSION:-latest}
  init: true

x-api-healthcheck: &api-healthcheck
  healthcheck:
    test: ['CMD', '/nodejs/bin/node', '-e', "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
    interval: 15s
    timeout: 5s
    start_period: 10s
    retries: 3

x-worker-healthcheck: &worker-healthcheck
  healthcheck:
    test: ['CMD', '/nodejs/bin/node', '-e', "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
    interval: 15s
    timeout: 5s
    start_period: 10s
    retries: 3

x-pg-healthcheck: &pg-healthcheck
  healthcheck:
    test: ['CMD-SHELL', 'pg_isready -U agledger']
    interval: 5s
    timeout: 5s
    retries: 5

# --- Hub Instance ---

services:

  hub-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: agledger
      POSTGRES_PASSWORD: agledger
      POSTGRES_DB: agledger
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - hub-pgdata:/var/lib/postgresql/data
    <<: *pg-healthcheck
    restart: unless-stopped

  hub-migrate:
    <<: *app-image
    command: ['dist/src/db/migrate.js']
    restart: 'no'
    env_file:
      - path: .env.federation-hub
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@hub-postgres:5432/agledger
    depends_on:
      hub-postgres:
        condition: service_healthy

  hub-api:
    <<: [*app-image, *api-healthcheck]
    ports:
      - '127.0.0.1:3010:3000'
    env_file:
      - path: .env.federation-hub
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@hub-postgres:5432/agledger
      - AGLEDGER_MODE=hub
      - ALLOW_DB_WITHOUT_SSL=true
    depends_on:
      hub-migrate:
        condition: service_completed_successfully

  hub-worker:
    <<: [*app-image, *worker-healthcheck]
    command: ['dist/src/worker.js']
    ports:
      - '127.0.0.1:3011:3001'
    env_file:
      - path: .env.federation-hub
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@hub-postgres:5432/agledger
      - AGLEDGER_MODE=hub
      - ALLOW_DB_WITHOUT_SSL=true
      - WORKER_HEALTH_PORT=3001
    depends_on:
      hub-migrate:
        condition: service_completed_successfully

  # --- Gateway 1 Instance ---

  gw1-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: agledger
      POSTGRES_PASSWORD: agledger
      POSTGRES_DB: agledger
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - gw1-pgdata:/var/lib/postgresql/data
    <<: *pg-healthcheck
    restart: unless-stopped

  gw1-migrate:
    <<: *app-image
    command: ['dist/src/db/migrate.js']
    restart: 'no'
    env_file:
      - path: .env.federation-gw1
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw1-postgres:5432/agledger
    depends_on:
      gw1-postgres:
        condition: service_healthy

  gw1-api:
    <<: [*app-image, *api-healthcheck]
    ports:
      - '127.0.0.1:3020:3000'
    env_file:
      - path: .env.federation-gw1
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw1-postgres:5432/agledger
      - AGLEDGER_MODE=gateway
      - AGLEDGER_HUB_URL=http://hub-api:3000
      - ALLOW_DB_WITHOUT_SSL=true
    depends_on:
      gw1-migrate:
        condition: service_completed_successfully
      hub-api:
        condition: service_healthy

  gw1-worker:
    <<: [*app-image, *worker-healthcheck]
    command: ['dist/src/worker.js']
    ports:
      - '127.0.0.1:3021:3001'
    env_file:
      - path: .env.federation-gw1
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw1-postgres:5432/agledger
      - AGLEDGER_MODE=gateway
      - AGLEDGER_HUB_URL=http://hub-api:3000
      - ALLOW_DB_WITHOUT_SSL=true
      - WORKER_HEALTH_PORT=3001
    depends_on:
      gw1-migrate:
        condition: service_completed_successfully
      hub-api:
        condition: service_healthy

  # --- Gateway 2 Instance (optional — for cross-gateway routing tests) ---

  gw2-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: agledger
      POSTGRES_PASSWORD: agledger
      POSTGRES_DB: agledger
    ports:
      - '127.0.0.1:5435:5432'
    volumes:
      - gw2-pgdata:/var/lib/postgresql/data
    <<: *pg-healthcheck
    restart: unless-stopped

  gw2-migrate:
    <<: *app-image
    command: ['dist/src/db/migrate.js']
    restart: 'no'
    env_file:
      - path: .env.federation-gw2
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw2-postgres:5432/agledger
    depends_on:
      gw2-postgres:
        condition: service_healthy

  gw2-api:
    <<: [*app-image, *api-healthcheck]
    ports:
      - '127.0.0.1:3030:3000'
    env_file:
      - path: .env.federation-gw2
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw2-postgres:5432/agledger
      - AGLEDGER_MODE=gateway
      - AGLEDGER_HUB_URL=http://hub-api:3000
      - ALLOW_DB_WITHOUT_SSL=true
    depends_on:
      gw2-migrate:
        condition: service_completed_successfully
      hub-api:
        condition: service_healthy

  gw2-worker:
    <<: [*app-image, *worker-healthcheck]
    command: ['dist/src/worker.js']
    ports:
      - '127.0.0.1:3031:3001'
    env_file:
      - path: .env.federation-gw2
        required: true
    environment:
      - DATABASE_URL=postgresql://agledger:agledger@gw2-postgres:5432/agledger
      - AGLEDGER_MODE=gateway
      - AGLEDGER_HUB_URL=http://hub-api:3000
      - ALLOW_DB_WITHOUT_SSL=true
      - WORKER_HEALTH_PORT=3001
    depends_on:
      gw2-migrate:
        condition: service_completed_successfully
      hub-api:
        condition: service_healthy

volumes:
  hub-pgdata:
  gw1-pgdata:
  gw2-pgdata:

networks:
  default:
    name: federation
